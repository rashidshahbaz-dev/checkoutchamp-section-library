<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Headers | CheckoutChamp Section Library</title>

  <link rel="stylesheet" href="../../global/base.css" />
  <link rel="stylesheet" href="../../global/preview.css" />
  <link rel="stylesheet" href="../../palettes/palette-01.css" />
  <link rel="stylesheet" href="./header-v1/style.css" />
</head>
<body>
  <main class="library">
    <header class="library__header">
      <a class="library-back" href="../../index.html">← Back to Library</a>
      <h1>Headers</h1>
      <p>Reusable header components for CheckoutChamp pages.</p>
    </header>

    <section class="component-preview">
      <div class="component-preview__head">
        <h2>Header V1</h2>
        <a class="component-preview__open" href="./header-v1/">Open full preview</a>
      </div>

      <div class="component-preview__render">
        <header class="coc-header coc-header--topbar-logo" data-coc-header>
          <div class="coc-header__topbar">
            <p class="coc-header__topbar-text">
              ☀️ SUMMER SALE ☀️ Get Up To 50% OFF + FREE Shipping + FREE Gift
            </p>
          </div>

          <div class="coc-header__logo-row">
            <a class="coc-header__logo-link" href="#" action="none">
              <img
                class="coc-header__logo fk-disable-lazy"
                src="https://assets.imagehub.io/b94f3fa6-89ea-4596-8a5e-5c6ba7a1f34e/1778335539613_Derma_Dream_Horizontal_Black_1.svg"
                alt="Derma Dream"
              />
            </a>
          </div>
        </header>
      </div>

      <div class="component-code-grid component-code-grid--three">
        <div class="component-code-box">
          <div class="component-code-box__top">
            <h3>HTML</h3>
            <button type="button" class="copy-code-btn" data-copy-target="header-v1-html">Copy HTML</button>
          </div>

    <pre><code
  id="header-v1-html"
  data-code-src="./header-v1/index.html"
  data-code-selector=".coc-header"
>Loading HTML...</code></pre>
        </div>

        <div class="component-code-box">
          <div class="component-code-box__top">
            <h3>CSS</h3>
            <button type="button" class="copy-code-btn" data-copy-target="header-v1-css">Copy CSS</button>
          </div>

          <pre><code
  id="header-v1-css"
  data-code-src="./header-v1/style.css"
>Loading CSS...</code></pre>
        </div>
        <div class="component-code-box">
  <div class="component-code-box__top">
    <h3>JS</h3>
    <button type="button" class="copy-code-btn" data-copy-target="header-v1-js">
      Copy JS
    </button>
  </div>

  <pre><code
    id="header-v1-js"
    data-code-src="./header-v1/script.js"
  >Loading JS...</code></pre>
</div>
      </div>
    </section>
  </main>

  <script src="../../global/preview.js"></script>
  <script src="./header-v1/script.js"></script>
</body>
</html>
