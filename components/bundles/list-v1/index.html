<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>COC Bundles List V1</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="../../../global/base.css">
  <link rel="stylesheet" href="../../../palettes/palette-01.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="coc-preview-main">
    <section class="coc-bundles coc-bundles--list coc-bundles-list-v1" data-coc-bundles>
      <div class="coc-bundles__inner">
        <div class="coc-bundles__sale">
          <h3 class="coc-bundles__sale-title">MEMORIAL DAY SALE</h3>
          <p class="coc-bundles__sale-subtitle">Up to 58% OFF</p>
        </div>

        <div class="coc-bundles__tabs" role="tablist" aria-label="Purchase type">
          <button class="coc-bundles__tab is-active" type="button" data-coc-bundle-tab="one-time" action="none">
            One time purchase
          </button>
          <button class="coc-bundles__tab" type="button" data-coc-bundle-tab="subscribe" action="none">
            Subscribe &amp; <strong>save 58%</strong>
          </button>
        </div>

        <form class="coc-bundles__panel is-active" data-coc-bundle-panel="one-time">
          <input type="hidden" name="quantity" value="1">

          <div class="coc-bundles__badge">Most Popular</div>

          <div class="coc-bundles__options">
            <label class="coc-bundles__option" data-price="$159">
              <input type="radio" name="bundle_one_time" value="3-month" data-total="$159">

              <span class="coc-bundles__option-left">
                <span class="coc-bundles__radio"></span>
                <span class="coc-bundles__image-wrap">
                  <img class="coc-bundles__image fk-disable-lazy" src="https://seranova.com/cdn/shop/files/Group_1484581285_1_1.png?v=1772900559&amp;width=128" alt="3 Month Supply">
                </span>
                <span class="coc-bundles__content">
                  <span class="coc-bundles__title">3 Month Supply</span>
                  <span class="coc-bundles__subtitle">6 Micro Infusion Treatments</span>
                </span>
              </span>

              <span class="coc-bundles__price-box">
                <span class="coc-bundles__unit-price"><span>$26</span>/treatment</span>
                <span class="coc-bundles__compare"><span>$49</span>/treatment</span>
                <span class="coc-bundles__save">YOU SAVE 46%</span>
              </span>
            </label>

            <label class="coc-bundles__option" data-price="$118">
              <input type="radio" name="bundle_one_time" value="2-month" data-total="$118">

              <span class="coc-bundles__option-left">
                <span class="coc-bundles__radio"></span>
                <span class="coc-bundles__image-wrap">
                  <img class="coc-bundles__image fk-disable-lazy" src="https://seranova.com/cdn/shop/files/Group_1484581283_1_47798a82-c7d4-4ff4-86b6-d95934c00c53.png?v=1772900584&amp;width=128" alt="2 Month Supply">
                </span>
                <span class="coc-bundles__content">
                  <span class="coc-bundles__title">2 Month Supply</span>
                  <span class="coc-bundles__subtitle">4 Micro Infusion Treatments</span>
                </span>
              </span>

              <span class="coc-bundles__price-box">
                <span class="coc-bundles__unit-price"><span>$29</span>/treatment</span>
                <span class="coc-bundles__compare"><span>$49</span>/treatment</span>
                <span class="coc-bundles__save">YOU SAVE 40%</span>
              </span>
            </label>

            <label class="coc-bundles__option is-selected" data-price="$99">
              <input type="radio" name="bundle_one_time" value="1-month" data-total="$99" checked>

              <span class="coc-bundles__option-left">
                <span class="coc-bundles__radio"></span>
                <span class="coc-bundles__image-wrap">
                  <img class="coc-bundles__image fk-disable-lazy" src="https://seranova.com/cdn/shop/files/Seranova24469_1.png?v=1772900708&amp;width=128" alt="1 Month Supply">
                </span>
                <span class="coc-bundles__content">
                  <span class="coc-bundles__title">1 Month Supply</span>
                  <span class="coc-bundles__subtitle">2 Micro Infusion Treatments</span>
                </span>
              </span>

              <span class="coc-bundles__price-box">
                <span class="coc-bundles__unit-price"><span>$49</span>/treatment</span>
              </span>
            </label>
          </div>

          <div class="coc-bundles__guarantee-line">90 Day Money Back Guarantee</div>

          <button class="coc-bundles__button" type="button" onclick="callMethod(event)" action="choose" offer="" upsell="" quantity="" price="" variantvalue="" replaceproductid="" billnow="false" size="none" btntype="none">
            ADD TO CART
          </button>
        </form>

        <form class="coc-bundles__panel" data-coc-bundle-panel="subscribe">
          <input type="hidden" name="quantity" value="1">

          <div class="coc-bundles__frequency-box">
            <div class="coc-bundles__frequency-header">
              <strong>Frequency:</strong>
              <span>Ships every 2 months</span>
            </div>

            <div class="coc-bundles__badge coc-bundles__badge--subscribe">Most Popular</div>

            <div class="coc-bundles__options">
              <label class="coc-bundles__option" data-price="$126" data-compare="$297">
                <input type="radio" name="bundle_subscribe" value="3-month" data-total="$126" data-compare="$297">

                <span class="coc-bundles__option-left">
                  <span class="coc-bundles__radio"></span>
                  <span class="coc-bundles__image-wrap">
                    <img class="coc-bundles__image fk-disable-lazy" src="https://seranova.com/cdn/shop/files/Group_1484581285_1_1.png?v=1772900559&amp;width=128" alt="3 Month Supply">
                  </span>
                  <span class="coc-bundles__content">
                    <span class="coc-bundles__title">3 Month Supply</span>
                    <span class="coc-bundles__subtitle">6 Micro Infusion Treatments</span>
                  </span>
                </span>

                <span class="coc-bundles__price-box">
                  <span class="coc-bundles__unit-price"><span>$21</span>/treatment</span>
                  <span class="coc-bundles__compare"><span>$49</span>/treatment</span>
                  <span class="coc-bundles__save">YOU SAVE 58%</span>
                </span>
              </label>

              <label class="coc-bundles__option is-selected" data-price="$98" data-compare="$198">
                <input type="radio" name="bundle_subscribe" value="2-month" data-total="$98" data-compare="$198" checked>

                <span class="coc-bundles__option-left">
                  <span class="coc-bundles__radio"></span>
                  <span class="coc-bundles__image-wrap">
                    <img class="coc-bundles__image fk-disable-lazy" src="https://seranova.com/cdn/shop/files/Group_1484581283_1_47798a82-c7d4-4ff4-86b6-d95934c00c53.png?v=1772900584&amp;width=128" alt="2 Month Supply">
                  </span>
                  <span class="coc-bundles__content">
                    <span class="coc-bundles__title">2 Month Supply</span>
                    <span class="coc-bundles__subtitle">4 Micro Infusion Treatments</span>
                  </span>
                </span>

                <span class="coc-bundles__price-box">
                  <span class="coc-bundles__unit-price"><span>$24</span>/treatment</span>
                  <span class="coc-bundles__compare"><span>$49</span>/treatment</span>
                  <span class="coc-bundles__save">YOU SAVE 50%</span>
                </span>
              </label>

              <label class="coc-bundles__option" data-price="$78" data-compare="$99">
                <input type="radio" name="bundle_subscribe" value="1-month" data-total="$78" data-compare="$99">

                <span class="coc-bundles__option-left">
                  <span class="coc-bundles__radio"></span>
                  <span class="coc-bundles__image-wrap">
                    <img class="coc-bundles__image fk-disable-lazy" src="https://seranova.com/cdn/shop/files/Seranova24469_1.png?v=1772900708&amp;width=128" alt="1 Month Supply">
                  </span>
                  <span class="coc-bundles__content">
                    <span class="coc-bundles__title">1 Month Supply</span>
                    <span class="coc-bundles__subtitle">2 Micro Infusion Treatments</span>
                  </span>
                </span>

                <span class="coc-bundles__price-box">
                  <span class="coc-bundles__unit-price"><span>$39</span>/treatment</span>
                  <span class="coc-bundles__compare"><span>$49</span>/treatment</span>
                  <span class="coc-bundles__save">YOU SAVE 21%</span>
                </span>
              </label>
            </div>
          </div>

          <div class="coc-bundles__guarantee-line">90 Day Money Back Guarantee | Pause or cancel anytime</div>

          <button class="coc-bundles__button" type="button" onclick="callMethod(event)" action="choose" offer="" upsell="" quantity="" price="" variantvalue="" replaceproductid="" billnow="false" size="none" btntype="none">
            ADD TO CART
          </button>
        </form>

        <div class="coc-bundles__risk">
          <div class="coc-bundles__seal" aria-hidden="true">
            <svg viewBox="0 0 76 76">
              <circle cx="38" cy="38" r="34" fill="none" stroke="currentColor" stroke-width="2"></circle>
              <circle cx="38" cy="38" r="24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-dasharray="2.5 3"></circle>
              <text x="38" y="32" text-anchor="middle" font-size="9" font-weight="700" fill="currentColor">90</text>
              <text x="38" y="42" text-anchor="middle" font-size="8" font-weight="700" fill="currentColor">DAY</text>
              <text x="38" y="52" text-anchor="middle" font-size="6" font-weight="700" fill="currentColor">GUARANTEE</text>
            </svg>
          </div>

          <p><strong>Try it risk free for 90 days.</strong> If you don't see visible results after 90 days, you'll get a refund.</p>
        </div>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
