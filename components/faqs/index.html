<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FAQs | CheckoutChamp Section Library</title>

  <link rel="stylesheet" href="../../global/base.css" />
  <link rel="stylesheet" href="../../global/preview.css" />
  <link rel="stylesheet" href="../../palettes/palette-01.css" />

  <style>
    .component-preview__iframe {
      width: 100%;
      min-height: 520px;
      border: 1px solid #dfe8e4;
      border-radius: 10px;
      background: #ffffff;
    }
  </style>
</head>

<body>
  <main class="library">
    <header class="library__header">
      <a class="library-back" href="../../index.html">← Back to Library</a>
      <h1>FAQs</h1>
      <p>Reusable FAQ accordion components for CheckoutChamp pages.</p>
    </header>

    <section class="component-preview">
      <div class="component-preview__head">
        <h2>FAQ V1</h2>
        <a class="component-preview__open" href="./faq-v1/">Open full preview</a>
      </div>

      <div class="component-preview__render">
        <iframe class="component-preview__iframe" src="./faq-v1/" title="FAQ V1 Preview"></iframe>
      </div>

      <div class="component-code-grid component-code-grid--three">
        <div class="component-code-box">
          <div class="component-code-box__top">
            <h3>HTML</h3>
            <button type="button" class="copy-code-btn" data-copy-target="faq-v1-html">Copy HTML</button>
          </div>
          <pre><code id="faq-v1-html" data-code-src="./faq-v1/index.html" data-code-selector=".coc-faq">Loading HTML...</code></pre>
        </div>

        <div class="component-code-box">
          <div class="component-code-box__top">
            <h3>CSS</h3>
            <button type="button" class="copy-code-btn" data-copy-target="faq-v1-css">Copy CSS</button>
          </div>
          <pre><code id="faq-v1-css" data-code-src="./faq-v1/style.css">Loading CSS...</code></pre>
        </div>

        <div class="component-code-box">
          <div class="component-code-box__top">
            <h3>JS</h3>
            <button type="button" class="copy-code-btn" data-copy-target="faq-v1-js">Copy JS</button>
          </div>
          <pre><code id="faq-v1-js" data-code-src="./faq-v1/script.js">Loading JS...</code></pre>
        </div>
      </div>
    </section>
  </main>

  <script src="../../global/preview.js"></script>
</body>
</html>
